<!-- templates/sections/contact.html -->
<div class="text-center">
    <h2 class="text-3xl font-semibold mb-6">Get in Touch</h2>
    
    <p class="text-gray-700 mb-8">{{ contact.message }}</p>
    
    <div class="flex flex-col items-center gap-4">
        <!-- Email Button -->
        <a href="mailto:{{ contact.email }}" 
           target="_blank"
           rel="noopener noreferrer"
           class="inline-flex items-center justify-center bg-black text-white px-8 py-4 rounded-2xl hover:bg-gray-800 transition text-lg font-medium">
            Send me an email
        </a>
        
        <!-- Social Links -->
        <div class="flex gap-6 text-sm mt-2">
            <a href="{{ site.social.linkedin }}" target="_blank" class="hover:text-blue-600">LinkedIn</a>
            <a href="{{ site.social.github }}" target="_blank" class="hover:text-blue-600">GitHub</a>
            <a href="{{ site.social.x }}" target="_blank" class="hover:text-blue-600">X</a>
            <a href="{{ site.social.medium }}" target="_blank" class="hover:text-blue-600">Medium</a>
        </div>
    </div>
</div>
