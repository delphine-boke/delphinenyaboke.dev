<!-- templates/sections/family.html -->
<div>
    <h2 class="text-3xl font-semibold mb-3">Personal</h2>
    <p class="text-gray-600 dark:text-gray-400 mb-8">{{ family.description }}</p>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        {% for photo in family.photos %}
        <div>
            <div class="aspect-[2/3] bg-gray-100 dark:bg-gray-800 rounded-2xl overflow-hidden">
                <img src="{{ photo.file }}" 
                     alt="{{ photo.caption }}"
                     loading="lazy"
                     class="w-full h-full object-cover">
            </div>
            <p class="mt-3 text-sm text-center text-gray-600 dark:text-gray-400">{{ photo.caption }}</p>
        </div>
        {% endfor %}
    </div>
</div>
