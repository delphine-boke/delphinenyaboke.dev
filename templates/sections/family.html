<!-- templates/sections/family.html -->
<div>
    <h2 class="text-3xl font-semibold mb-8">Personal</h2>
    
    <p class="text-gray-700 mb-8">{{ family.description }}</p>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        {% for photo in family.photos %}
        <div class="group">
            <div class="aspect-square bg-gray-200 rounded-2xl overflow-hidden">
                <img src="{{ photo.file }}" 
                     alt="{{ photo.caption }}"
                     class="w-full h-full object-cover transition group-hover:scale-105">
            </div>
            <p class="mt-3 text-sm text-center text-gray-600">{{ photo.caption }}</p>
        </div>
        {% endfor %}
    </div>
</div>
