<!-- templates/sections/hero.html -->
<div class="max-w-5xl mx-auto px-6 py-20 text-center">
    <h1 class="text-5xl font-bold tracking-tight">{{ site.name }}</h1>
    <p class="mt-4 text-2xl text-gray-600">{{ site.tagline }}</p>
    <p class="mt-6 max-w-2xl mx-auto text-lg text-gray-600">
        {{ site.description }}
    </p>
    
    <div class="mt-8 flex justify-center gap-4">
        <a href="#about" 
           class="px-6 py-3 bg-black text-white rounded-lg hover:bg-gray-800 transition">
            Learn more
        </a>
        <a href="#contact" 
           class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
            Get in touch
        </a>
    </div>
</div>
